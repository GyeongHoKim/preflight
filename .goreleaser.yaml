# .goreleaser.yaml — preflight release configuration
version: 2

builds:
  - main: ./cmd/preflight
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  extra_files:
    - glob: ./scripts/install.sh

brews:
  - name: preflight
    homepage: https://github.com/GyeongHoKim/preflight
    description: AI-powered pre-push code review hook
    repository:
      owner: GyeongHoKim
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
