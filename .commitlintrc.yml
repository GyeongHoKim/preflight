# .commitlintrc.yml — https://commitlint.js.org/
extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert

  subject-full-stop:
    - 2
    - never
    - "."

  subject-case:
    - 2
    - never
    - - sentence-case
      - start-case
      - pascal-case
      - upper-case

  scope-case:
    - 2
    - always
    - lower-case

  header-max-length:
    - 2
    - always
    - 100
